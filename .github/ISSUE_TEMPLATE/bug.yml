name: '🐞 Bug Report'
description: 'Describe the issue to help us improve'
labels: ['bug']

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue! Please fill out the details below to help us resolve it more quickly.

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Call `battery()` in component
        2. Check `isSupported()` signal
        3. See error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: signality-version
    attributes:
      label: Signality version
      placeholder: 0.0.1-alpha.x
    validations:
      required: true

  - type: input
    id: angular-version
    attributes:
      label: Angular version
      placeholder: 19.x.x
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Select the browser where the issue occurred.
      options:
        - Google Chrome
        - Mozilla Firefox
        - Microsoft Edge
        - Safari
        - Other
        - N/A (SSR issue)
    validations:
      required: false

  - type: dropdown
    id: operating_system
    attributes:
      label: Operating system
      description: Select the operating system where the issue occurred.
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any additional information, screenshots, or code snippets.
