<ng-demo-wrapper [demoPath]="'device-pixel-ratio/device-pixel-ratio-demo'" [code]="importCode">
  <demo-card>
    <div class="dpr-visual">
      <div class="dpr-grid" [style.--dpr]="pixelRatio()" [style.--grid-size]="gridSize()">
        @for (cell of gridCells(); track cell.row + '-' + cell.col) {
          <div class="dpr-pixel" [style.opacity]="0.2 + (cell.row + cell.col) * 0.05"></div>
        }
      </div>
    </div>

    <div class="dpr-divider"></div>

    <div class="dpr-rows">
      <div class="dpr-row">
        <span class="dpr-label">Pixel Ratio</span>
        <span class="dpr-value">{{ pixelRatio() }}x</span>
      </div>
    </div>

    <p class="dpr-hint">
      <svg
        class="dpr-hint-icon"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.3-4.3" />
        <path d="M11 8v6" />
        <path d="M8 11h6" />
      </svg>
      Try zooming in/out to see changes
    </p>
  </demo-card>
</ng-demo-wrapper>
