<ng-demo-wrapper [demoPath]="'storage/storage-demo'" [code]="importCode">
  <demo-card>
    <!-- Toggle + Input -->
    <div class="st-input-row">
      <demo-toggle [options]="storageOptions" [value]="storageType" />
      <input
        demoInput
        class="st-input"
        size="sm"
        placeholder="Type something to persist..."
        [(ngModel)]="message"
      />
    </div>

    <div class="st-divider"></div>

    <!-- Footer -->
    <div class="st-footer">
      <span class="st-status">
        <svg
          class="st-sync-icon"
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
          <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
          <path d="M16 16h5v5" />
        </svg>
        Synced to: <a [href]="storageUrl()" target="_blank" rel="noopener">{{ storageType() }}Storage</a>
      </span>
      <button class="st-clear" (click)="clear()">Clear</button>
    </div>
  </demo-card>
</ng-demo-wrapper>
