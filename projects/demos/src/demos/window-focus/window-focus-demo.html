<ng-demo-wrapper [demoPath]="'window-focus/window-focus-demo'" [code]="importCode">
  <demo-card>
    <div class="wf-wrap">
      <!-- Icon ring -->
      <div class="wf-visual">
        <div class="wf-icon-ring-container">
          <div class="wf-radar" [class.wf-radar--active]="isFocused()">
            <div class="wf-radar-ring wf-radar-ring--1"></div>
            <div class="wf-radar-ring wf-radar-ring--2"></div>
            <div class="wf-radar-ring wf-radar-ring--3"></div>
            <div
              class="wf-icon-ring"
              [class.wf-icon-ring--focused]="isFocused()"
              [class.wf-icon-ring--blurred]="!isFocused()"
            >
              <div class="wf-icon-inner">
                <!-- Focused — window icon -->
                <svg
                  width="26"
                  height="26"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  [style.opacity]="focusedOpacity()"
                >
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <line x1="3" y1="9" x2="21" y2="9" />
                  <circle cx="7" cy="6" r="0.5" fill="currentColor" />
                  <circle cx="10" cy="6" r="0.5" fill="currentColor" />
                </svg>

                <!-- Blurred — minimized window icon -->
                <svg
                  width="26"
                  height="26"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  [style.opacity]="blurredOpacity()"
                >
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <line x1="3" y1="9" x2="21" y2="9" />
                  <line x1="9" y1="13" x2="15" y2="13" />
                </svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Text -->
      <div class="wf-text">
        <h3 class="wf-title">{{ isFocused() ? 'Focused' : 'Blurred' }}</h3>
        <p class="wf-subtitle">
          {{ isFocused() ? 'Window is in focus' : 'Click here to refocus' }}
        </p>
      </div>
    </div>
  </demo-card>
</ng-demo-wrapper>
