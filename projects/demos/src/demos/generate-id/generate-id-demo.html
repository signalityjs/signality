<ng-demo-wrapper [demoPath]="'generate-id/generate-id-demo'" [code]="importCode">
  <demo-card>
    <div class="gid-row">
      <span class="gid-value">
        <code>{{ currentId() }}</code>
      </span>
      <button class="gid-btn" (click)="generate()">
        <svg
          class="gid-btn-icon"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          [style.transform]="'rotate(' + rotation() + 'deg)'"
        >
          <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
          <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
          <path d="M16 16h5v5" />
        </svg>
        Generate
      </button>
    </div>
  </demo-card>
</ng-demo-wrapper>
